<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片无缝拼接</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='3' y='3' width='18' height='18' rx='4' fill='%23000'/%3E%3Cline x1='12' y1='3' x2='12' y2='21' stroke='%23fff' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='3' y1='12' x2='21' y2='12' stroke='%23fff' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; }
        
        /* 画布自适应 */
        .canvas-container { 
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 4px 6px -1px rgba(0,0,0,0.1); 
            width: 100%;
            height: auto;
            display: block;
        }

        /* 全屏遮罩层 - 滚动模式 */
        #fullscreenOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 100;
            overflow-y: auto;
            padding: 40px 20px;
            text-align: center;
            cursor: zoom-out;
            backdrop-filter: blur(5px);
        }
        
        .overlay-content {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #fullscreenImg {
            max-width: 95%;
            height: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }

        /* 按钮微交互 */
        .btn-icon { transition: all 0.2s; }
        .btn-icon:hover { transform: scale(1.1); }

        .image-card { min-width: 230px; max-width: 230px; }
        .image-card.dragging { opacity: 0.5; }
        .scrollbar-hide::-webkit-scrollbar { height: 6px; }
        .scrollbar-hide::-webkit-scrollbar-thumb { background: rgba(15,23,42,0.15); border-radius: 999px; }
        .drop-hint { outline: 2px dashed rgba(15,23,42,0.25); outline-offset: -4px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="mb-8 space-y-2">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-xl bg-black text-white flex items-center justify-center shadow-sm">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="4"></rect>
                        <line x1="12" y1="3" x2="12" y2="21"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight text-slate-900">图片无缝拼接</h1>
                    <p class="text-sm text-slate-500">上传多张长图，进行水平或垂直无缝组合。</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-[320px_minmax(420px,1fr)_520px] gap-8">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-5 sticky top-8">
                    
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">拼接方向</label>
                        <div class="flex p-1 bg-slate-100 rounded-lg">
                            <button id="btnVertical" onclick="setDirection('vertical')" class="flex-1 px-3 py-2 text-sm font-medium rounded-md transition-all bg-white text-slate-900 shadow-sm ring-1 ring-slate-200">
                                垂直拼接
                            </button>
                            <button id="btnHorizontal" onclick="setDirection('horizontal')" class="flex-1 px-3 py-2 text-sm font-medium rounded-md transition-all text-slate-500 hover:text-slate-900 hover:bg-slate-200/50">
                                水平拼接
                            </button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">导出格式</label>
                        <div class="flex p-1 bg-slate-100 rounded-lg">
                            <button id="fmtAuto" onclick="setFormat('auto')" class="flex-1 px-2 py-2 text-sm font-medium rounded-md transition-all bg-white text-slate-900 shadow-sm ring-1 ring-slate-200">自动</button>
                            <button id="fmtPng" onclick="setFormat('image/png')" class="flex-1 px-2 py-2 text-sm font-medium rounded-md transition-all text-slate-500 hover:text-slate-900 hover:bg-slate-200/50">PNG</button>
                            <button id="fmtJpg" onclick="setFormat('image/jpeg')" class="flex-1 px-2 py-2 text-sm font-medium rounded-md transition-all text-slate-500 hover:text-slate-900 hover:bg-slate-200/50">JPG</button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">导出文件名</label>
                        <input id="exportName" type="text" placeholder="例如：my_stitch" class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-slate-200">
                    </div>

                    <div class="flex items-center justify-between pt-1">
                        <label class="text-sm text-slate-600 flex items-center gap-2">
                            <input id="unlockLimit" type="checkbox" class="accent-slate-900">
                            解除数量限制
                        </label>
                        <span id="countHint" class="text-xs text-slate-400">已添加 0/10</span>
                    </div>

                    <div class="pt-2 space-y-2">
                        <button id="downloadBtn" disabled class="w-full bg-black text-white py-3 px-4 rounded-lg text-sm font-medium hover:bg-slate-900 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2 shadow-lg shadow-slate-200">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                            导出拼接图片
                        </button>
                        <button id="clearAllBtn" class="w-full border border-slate-200 text-slate-600 py-2.5 px-4 rounded-lg text-sm font-medium hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                            一键清空所有图片
                        </button>
                    </div>
                </div>

            </div>

            <div class="space-y-4">
                <div class="bg-slate-100 rounded-xl min-h-[200px] p-6 relative group border border-slate-200">
                    
                    <div id="toolsBar" class="absolute top-4 right-4 gap-2 z-30 opacity-0 group-hover:opacity-100 transition-opacity duration-200 hidden">
                        <button onclick="toggleFullscreen()" class="btn-icon bg-white border border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-200 p-2.5 rounded-lg shadow-sm" title="全屏查看">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                        </button>
                        <button onclick="openInNewTab()" class="btn-icon bg-white border border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-200 p-2.5 rounded-lg shadow-sm" title="新标签页打开">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        </button>
                    </div>
                    
                    <div id="canvasPlaceholder" class="flex flex-col items-center justify-center h-40 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mb-4 text-slate-300"><path d="M2 12h20"/><path d="M12 2v20"/></svg>
                        <p class="text-sm">预览区域</p>
                    </div>

                    <canvas id="mainCanvas" class="canvas-container bg-white hidden"></canvas>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-white border border-slate-200 rounded-xl p-4 sticky top-8">
                    <div id="imageList" class="grid grid-cols-2 gap-4 max-h-[560px] overflow-y-auto pr-1 scrollbar-hide"></div>
                    <input type="file" id="addInput" class="hidden" accept="image/*" multiple>
                </div>
            </div>
        </div>
    </div>

    <div id="fullscreenOverlay" onclick="toggleFullscreen()">
        <div class="overlay-content">
            <img id="fullscreenImg" src="" alt="Full Preview" onclick="event.stopPropagation()">
            <p class="text-white/70 text-sm mt-4 mb-8">点击任意处关闭</p>
        </div>
    </div>

    <script>
        const ctx = mainCanvas.getContext('2d');
        const imageList = [];
        let direction = 'vertical';
        let exportFormat = 'auto';
        let detectedFormat = 'image/png';
        let maxCount = 10;
        let idCounter = 1;

        const addInput = document.getElementById('addInput');
        const exportNameInput = document.getElementById('exportName');
        const unlockLimit = document.getElementById('unlockLimit');
        const countHint = document.getElementById('countHint');
        const listEl = document.getElementById('imageList');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');

        addInput.addEventListener('change', handleAddFiles);
        downloadBtn.addEventListener('click', downloadImage);
        exportNameInput.addEventListener('input', updateExportState);
        unlockLimit.addEventListener('change', updateCountHint);
        clearAllBtn.addEventListener('click', clearAllImages);
        listEl.addEventListener('dragover', handleDropZoneOver);
        listEl.addEventListener('dragleave', handleDropZoneLeave);
        listEl.addEventListener('drop', handleDropZoneFiles);

        function canAddMore(countToAdd = 1) {
            if (unlockLimit.checked) return true;
            return imageList.length + countToAdd <= maxCount;
        }

        function updateCountHint() {
            const limitText = unlockLimit.checked ? '∞' : maxCount;
            countHint.textContent = `已添加 ${imageList.length}/${limitText}`;
        }

        async function handleAddFiles(e) {
            const files = Array.from(e.target.files || []);
            await addFiles(files);
            addInput.value = '';
        }

        async function addFiles(files) {
            if (files.length === 0) return;
            for (const file of files) {
                if (!canAddMore(1)) break;
                const item = await loadImageFile(file);
                imageList.push(item);
            }
            if (imageList.length > 0 && exportFormat === 'auto') {
                detectedFormat = imageList[0].file.type || 'image/png';
            }
            renderImageList();
            draw();
        }

        function loadImageFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        resolve({
                            id: idCounter++,
                            file,
                            img,
                            name: file.name,
                            dataUrl: event.target.result
                        });
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function renderImageList() {
            listEl.innerHTML = '';
            imageList.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'image-card relative group border-2 border-dashed border-slate-200 rounded-xl p-4 transition-all hover:border-slate-400 hover:bg-slate-50 bg-white min-h-[180px] flex flex-col items-center justify-center';
                card.draggable = true;
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="w-full h-full relative z-20 flex items-center justify-center">
                        <img src="${item.dataUrl}" class="max-h-32 max-w-full object-contain rounded shadow-sm pointer-events-none">
                        <span class="absolute bottom-0 left-0 right-0 text-[10px] text-slate-500 truncate bg-white/95 px-10 py-1 text-center pointer-events-none rounded-b">${item.name}</span>
                        <button class="btn-icon absolute -top-3 -right-3 bg-white border border-slate-200 text-slate-500 hover:text-red-600 hover:border-red-200 rounded-full w-8 h-8 flex items-center justify-center shadow-md opacity-0 group-hover:opacity-100 transition-all z-30" title="移除图片" data-action="remove">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                        <button class="btn-icon absolute -bottom-3 -left-3 bg-white border border-slate-200 text-slate-500 hover:text-slate-900 rounded-full w-8 h-8 flex items-center justify-center shadow-md opacity-0 group-hover:opacity-100 transition-all z-30" data-action="left" title="左移">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 6 9 12 15 18"/></svg>
                        </button>
                        <button class="btn-icon absolute -bottom-3 -right-3 bg-white border border-slate-200 text-slate-500 hover:text-slate-900 rounded-full w-8 h-8 flex items-center justify-center shadow-md opacity-0 group-hover:opacity-100 transition-all z-30" data-action="right" title="右移">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
                        </button>
                    </div>
                `;
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('drop', handleDrop);
                card.addEventListener('dragend', handleDragEnd);
                card.addEventListener('click', handleCardAction);
                listEl.appendChild(card);
            });

            if (canAddMore(1)) {
                const addCard = document.createElement('button');
                addCard.type = 'button';
                addCard.className = 'image-card border-2 border-dashed border-slate-200 rounded-xl p-4 transition-all hover:border-slate-400 hover:bg-slate-50 flex flex-col items-center justify-center bg-white min-h-[180px]';
                addCard.innerHTML = `
                    <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                    </div>
                    <p class="text-xs font-medium text-slate-600">点击添加图片</p>
                    <p class="text-[10px] text-slate-400 mt-1">支持 JPG / PNG</p>
                `;
                addCard.addEventListener('click', () => addInput.click());
                listEl.appendChild(addCard);
            }

            updateCountHint();
            updateExportState();
        }

        function handleCardAction(e) {
            const action = e.target.closest('button')?.dataset.action;
            if (!action) return;
            const card = e.currentTarget;
            const index = parseInt(card.dataset.index, 10);
            if (Number.isNaN(index)) return;
            if (action === 'remove') {
                imageList.splice(index, 1);
                renderImageList();
                draw();
            }
            if (action === 'left' && index > 0) {
                const [item] = imageList.splice(index, 1);
                const newIndex = index - 1;
                imageList.splice(newIndex, 0, item);
                renderImageList();
                draw();
                requestAnimationFrame(() => {
                    listEl.children[newIndex]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                });
            }
            if (action === 'right' && index < imageList.length - 1) {
                const [item] = imageList.splice(index, 1);
                const newIndex = index + 1;
                imageList.splice(newIndex, 0, item);
                renderImageList();
                draw();
                requestAnimationFrame(() => {
                    listEl.children[newIndex]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                });
            }
        }

        let dragIndex = null;
        function handleDragStart(e) {
            dragIndex = parseInt(e.currentTarget.dataset.index, 10);
            e.currentTarget.classList.add('dragging');
        }
        function handleDragOver(e) {
            e.preventDefault();
        }
        function handleDrop(e) {
            e.preventDefault();
            const targetIndex = parseInt(e.currentTarget.dataset.index, 10);
            if (Number.isNaN(dragIndex) || Number.isNaN(targetIndex) || dragIndex === targetIndex) return;
            const [item] = imageList.splice(dragIndex, 1);
            imageList.splice(targetIndex, 0, item);
            dragIndex = null;
            renderImageList();
            draw();
        }
        function handleDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
        }

        function setDirection(dir) {
            direction = dir;
            updateToggleStyles('btn', dir === 'vertical' ? 'btnVertical' : 'btnHorizontal');
            draw();
        }

        function setFormat(fmt) {
            exportFormat = fmt;
            let activeId = 'fmtAuto';
            if (fmt === 'image/png') activeId = 'fmtPng';
            if (fmt === 'image/jpeg') activeId = 'fmtJpg';
            updateToggleStyles('fmt', activeId);
        }

        function updateToggleStyles(prefix, activeId) {
            const ids = prefix === 'btn' ? ['btnVertical', 'btnHorizontal'] : ['fmtAuto', 'fmtPng', 'fmtJpg'];
            const activeClass = "bg-white text-slate-900 shadow-sm ring-1 ring-slate-200 font-medium";
            const inactiveClass = "text-slate-500 hover:text-slate-900 hover:bg-slate-200/50";
            ids.forEach(id => {
                const el = document.getElementById(id);
                el.className = `flex-1 ${prefix === 'fmt' ? 'px-2' : 'px-3'} py-2 text-sm rounded-md transition-all ${id === activeId ? activeClass : inactiveClass}`;
            });
        }

        function draw() {
            if (imageList.length < 2) {
            document.getElementById('mainCanvas').classList.add('hidden');
            document.getElementById('canvasPlaceholder').classList.remove('hidden');
            const toolsBar = document.getElementById('toolsBar');
            toolsBar.classList.add('hidden');
            toolsBar.classList.remove('flex');
            updateExportState();
            return;
        }

        document.getElementById('canvasPlaceholder').classList.add('hidden');
        document.getElementById('mainCanvas').classList.remove('hidden');
        const toolsBar = document.getElementById('toolsBar');
        toolsBar.classList.remove('hidden');
        toolsBar.classList.add('flex');

            let canvasWidth = 0;
            let canvasHeight = 0;

            if (direction === 'vertical') {
                canvasWidth = Math.max(...imageList.map(item => item.img.width));
                canvasHeight = imageList.reduce((sum, item) => sum + item.img.height, 0);
                mainCanvas.width = canvasWidth;
                mainCanvas.height = canvasHeight;
                let offsetY = 0;
                imageList.forEach(item => {
                    ctx.drawImage(item.img, 0, offsetY);
                    offsetY += item.img.height;
                });
            } else {
                canvasWidth = imageList.reduce((sum, item) => sum + item.img.width, 0);
                canvasHeight = Math.max(...imageList.map(item => item.img.height));
                mainCanvas.width = canvasWidth;
                mainCanvas.height = canvasHeight;
                let offsetX = 0;
                imageList.forEach(item => {
                    ctx.drawImage(item.img, offsetX, 0);
                    offsetX += item.img.width;
                });
            }

            updateExportState();
        }

        function updateExportState() {
            const nameOk = exportNameInput.value.trim().length > 0;
            downloadBtn.disabled = !(imageList.length >= 2 && nameOk);
        }

        function getExportData() {
            const format = exportFormat === 'auto' ? detectedFormat : exportFormat;
            return mainCanvas.toDataURL(format, 0.92);
        }

        function toggleFullscreen() {
            const overlay = document.getElementById('fullscreenOverlay');
            const fullImg = document.getElementById('fullscreenImg');
            if (overlay.style.display === 'block') {
                overlay.style.display = 'none';
                document.body.style.overflow = 'auto';
            } else {
                fullImg.src = getExportData();
                overlay.style.display = 'block';
                document.body.style.overflow = 'hidden';
            }
        }

        function openInNewTab() {
            const dataUrl = getExportData();
            const win = window.open();
            if (win) {
                win.document.write(`
                    <html>
                        <head><title>拼接图片预览</title></head>
                        <body style="margin:0; display:flex; justify-content:center; background:#222;">
                            <img src="${dataUrl}" style="max-width:100%; height:auto; display:block; box-shadow:0 0 20px rgba(0,0,0,0.5);">
                        </body>
                    </html>
                `);
            } else {
                alert('请允许弹出窗口以在新标签页查看图片');
            }
        }

        function downloadImage() {
            const format = exportFormat === 'auto' ? detectedFormat : exportFormat;
            const ext = format === 'image/jpeg' ? 'jpg' : 'png';
            const name = exportNameInput.value.trim() || `stitched_image_${Date.now()}`;
            const link = document.createElement('a');
            link.download = `${name}.${ext}`;
            link.href = getExportData();
            link.click();
        }

        function clearAllImages() {
            if (!window.confirm('确定要清空所有已上传图片吗？')) return;
            imageList.splice(0, imageList.length);
            renderImageList();
            draw();
        }

        function handleDropZoneOver(e) {
            e.preventDefault();
            listEl.classList.add('drop-hint');
        }

        function handleDropZoneLeave() {
            listEl.classList.remove('drop-hint');
        }

        async function handleDropZoneFiles(e) {
            e.preventDefault();
            listEl.classList.remove('drop-hint');
            const files = Array.from(e.dataTransfer?.files || []).filter(file => file.type.startsWith('image/'));
            await addFiles(files);
        }

        renderImageList();
    </script>
</body>
</html>
